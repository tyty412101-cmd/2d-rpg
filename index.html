<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// PLAYER
let player = {
  x: 50,
  y: 50,
  size: 20,
  speed: 3,
  hp: 100,
  attack: 10
};

// ENEMY
let enemy = {
  x: 300,
  y: 200,
  size: 20,
  hp: 50,
  alive: true
};

let keys = {};
let attackCooldown = 0;

// WALLS
const walls = [
  {x: 150, y: 0, width: 20, height: 200},
  {x: 100, y: 250, width: 300, height: 20}
];

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function isColliding(a, b) {
  return a.x < b.x + b.width &&
         a.x + a.size > b.x &&
         a.y < b.y + b.height &&
         a.y + a.size > b.y;
}

function update() {
  let newX = player.x;
  let newY = player.y;

  if (keys["ArrowUp"]) newY -= player.speed;
  if (keys["ArrowDown"]) newY += player.speed;
  if (keys["ArrowLeft"]) newX -= player.speed;
  if (keys["ArrowRight"]) newX += player.speed;

  let future = {x: newX, y: newY, size: player.size};

  let blocked = walls.some(w => isColliding(future, w));

  if (!blocked) {
    player.x = newX;
    player.y = newY;
  }

  // ATTACK (press space)
  if (keys[" "] && attackCooldown <= 0 && enemy.alive) {
    let dist = Math.hypot(player.x - enemy.x, player.y - enemy.y);
    if (dist < 40) {
      enemy.hp -= player.attack;
      attackCooldown = 20;

      if (enemy.hp <= 0) {
        enemy.alive = false;
      }
    }
  }

  if (attackCooldown > 0) attackCooldown--;

  // ENEMY AI (simple follow)
  if (enemy.alive) {
    let dx = player.x - enemy.x;
    let dy = player.y - enemy.y;
    let dist = Math.hypot(dx, dy);

    if (dist > 1) {
      enemy.x += dx / dist * 1;
      enemy.y += dy / dist * 1;
    }

    // damage player
    if (dist < 20) {
      player.hp -= 0.2;
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // PLAYER
  ctx.fillStyle = "blue";
  ctx.fillRect(player.x, player.y, player.size, player.size);

  // ENEMY
  if (enemy.alive) {
    ctx.fillStyle = "red";
    ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);
  }

  // WALLS
  ctx.fillStyle = "gray";
  walls.forEach(w => ctx.fillRect(w.x, w.y, w.width, w.height));

  // UI
  ctx.fillStyle = "black";
  ctx.fillText("HP: " + Math.floor(player.hp), 10, 20);

  if (!enemy.alive) {
    ctx.fillText("Enemy defeated!", 200, 20);
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
